name: 🎮 Scrape Mobile Game Releases

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      force_full_refresh:
        description: "Force full refresh"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  scrape:
    name: Fetch & Update Games Data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔄 Full refresh (optional)
        if: ${{ inputs.force_full_refresh == 'true' }}
        run: echo '{"lastUpdated":"","games":[]}' > data/games.json

      - name: 🎮 Run scraper
        run: python scripts/scrape.py

      - name: 💾 Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/games.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            GAME_COUNT=$(python3 -c "import json; d=json.load(open('data/games.json')); print(len(d['games']))")
            git commit -m "🎮 Update game releases — ${GAME_COUNT} games [$(date +'%Y-%m-%d')]"
            git push
          fi
