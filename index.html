<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Games Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0a0b0f;
      --surface:   #111318;
      --surface2:  #181b22;
      --border:    #ffffff0f;
      --border2:   #ffffff1a;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --ios:       #3b82f6;
      --ios-bg:    #3b82f615;
      --android:   #22c55e;
      --android-bg:#22c55e15;
      --both:      #f59e0b;
      --both-bg:   #f59e0b15;
      --today:     #7c3aed;
      --accent:    #7c3aed;
      --radius:    12px;
      --radius-sm: 8px;
    }
    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, #7c3aed18 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, #3b82f612 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .app {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .header-left h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #e8eaf0 0%, #9ca3af 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-left h1 span {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-left .subtitle {
      margin-top: 0.4rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .last-updated { font-size: 0.7rem; color: var(--muted); text-align: right; }
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .month-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 0.4rem;
    }
    .btn-nav {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      font-size: 1rem;
    }
    .btn-nav:hover { background: var(--border2); }
    .month-label {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      min-width: 160px;
      text-align: center;
      letter-spacing: -0.01em;
    }
    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-left: auto; }
    .filter-btn {
      padding: 0.35rem 0.9rem;
      border-radius: 99px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }
    .filter-btn:hover { border-color: var(--text); color: var(--text); }
    .filter-btn.active-ios     { background: var(--ios-bg);     border-color: var(--ios);     color: var(--ios); }
    .filter-btn.active-android { background: var(--android-bg); border-color: var(--android); color: var(--android); }
    .filter-btn.active-all     { background: #ffffff12;         border-color: var(--text);    color: var(--text); }
    .legend { display: flex; gap: 1.2rem; margin-bottom: 1.5rem; font-size: 0.7rem; color: var(--muted); }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-ios     { background: var(--ios); }
    .dot-android { background: var(--android); }
    .dot-both    { background: var(--both); }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day-header {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      padding: 0.5rem 0;
      font-weight: 500;
    }
    .day-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      min-height: 110px;
      padding: 0.5rem;
      transition: border-color 0.15s;
      cursor: default;
      position: relative;
    }
    .day-cell:hover { border-color: var(--border2); }
    .day-cell.empty { background: transparent; border-color: transparent; }
    .day-cell.today { border-color: var(--today); background: #7c3aed08; }
    .day-cell.has-games { cursor: pointer; }
    .day-cell.has-games:hover { border-color: var(--border2); background: var(--surface2); }
    .day-number { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 0.4rem; }
    .day-cell.today .day-number { color: var(--accent); }
    .game-chips { display: flex; flex-direction: column; gap: 3px; }
    .chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 6px;
      border-radius: 5px;
      font-size: 0.62rem;
      line-height: 1.2;
      transition: opacity 0.15s;
      cursor: pointer;
      overflow: hidden;
    }
    .chip:hover { opacity: 0.8; }
    .chip.ios     { background: var(--ios-bg);     border-left: 2px solid var(--ios); }
    .chip.android { background: var(--android-bg); border-left: 2px solid var(--android); }
    .chip.both    { background: var(--both-bg);    border-left: 2px solid var(--both); }
    .chip-icon { width: 14px; height: 14px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
    .chip-icon-placeholder { width: 14px; height: 14px; border-radius: 3px; background: var(--border2); flex-shrink: 0; }
    .chip-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .more-badge { font-size: 0.6rem; color: var(--muted); padding: 2px 4px; background: var(--border); border-radius: 4px; cursor: pointer; }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #00000088;
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 1.5rem;
      position: relative;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: var(--border);
      border: none;
      color: var(--text);
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: var(--border2); }
    .modal-date { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; color: var(--text); }
    .modal-game {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      border: 1px solid var(--border);
      margin-bottom: 0.5rem;
      transition: border-color 0.15s;
      text-decoration: none;
      color: var(--text);
    }
    .modal-game:hover { border-color: var(--border2); }
    .modal-game-icon { width: 48px; height: 48px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0; background: var(--border); }
    .modal-game-info { flex: 1; min-width: 0; }
    .modal-game-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal-game-meta { font-size: 0.7rem; color: var(--muted); display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .badge { padding: 1px 6px; border-radius: 4px; font-size: 0.62rem; }
    .badge-ios     { background: var(--ios-bg);     color: var(--ios); }
    .badge-android { background: var(--android-bg); color: var(--android); }
    .badge-price   { background: var(--border);     color: var(--muted); }
    .stars { color: var(--both); font-size: 0.65rem; }
    .stats-bar {
      display: flex;
      gap: 1.5rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      font-size: 0.72rem;
      flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; }
    .stat-label { color: var(--muted); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    @media (max-width: 600px) {
      .day-cell { min-height: 70px; padding: 0.35rem; }
      .chip-title { display: none; }
      .chip { padding: 3px; }
      .controls { gap: 0.5rem; }
      .filters { margin-left: 0; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <h1>📱 Mobile<span>Games</span></h1>
      <p class="subtitle">RELEASE CALENDAR · iOS & ANDROID</p>
    </div>
    <div class="last-updated" id="lastUpdated">—</div>
  </header>
  <div class="controls">
    <div class="month-nav">
      <button class="btn-nav" id="btnPrev">◀</button>
      <span class="month-label" id="monthLabel">—</span>
      <button class="btn-nav" id="btnNext">▶</button>
    </div>
    <button class="btn-nav" id="btnToday" style="background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);width:auto;padding:0 0.75rem;font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);">TODAY</button>
    <div class="filters">
      <button class="filter-btn active-all" data-filter="all">ALL</button>
      <button class="filter-btn" data-filter="ios">iOS</button>
      <button class="filter-btn" data-filter="android">ANDROID</button>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat"><span class="stat-val" id="statTotal">—</span><span class="stat-label">ce mois</span></div>
    <div class="stat"><span class="stat-val" style="color:var(--ios)" id="statIos">—</span><span class="stat-label">iOS</span></div>
    <div class="stat"><span class="stat-val" style="color:var(--android)" id="statAndroid">—</span><span class="stat-label">Android</span></div>
    <div class="stat"><span class="stat-val" id="statFree">—</span><span class="stat-label">gratuits</span></div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="dot dot-ios"></div>iOS uniquement</div>
    <div class="legend-item"><div class="dot dot-android"></div>Android uniquement</div>
    <div class="legend-item"><div class="dot dot-both"></div>Les deux plateformes</div>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
</div>
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-date" id="modalDate"></div>
    <div id="modalGames"></div>
  </div>
</div>
<script>
let allGames  = [];
let curYear   = new Date().getFullYear();
let curMonth  = new Date().getMonth();
let curFilter = 'all';
const today   = new Date();
const fmt = (y, m, d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_FR   = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

function getPlatformClass(game) {
  const has = (p) => game.platform.includes(p);
  if (has('ios') && has('android')) return 'both';
  if (has('ios'))     return 'ios';
  if (has('android')) return 'android';
  return 'ios';
}
function filterGames(games) {
  if (curFilter === 'all') return games;
  return games.filter(g => g.platform.includes(curFilter));
}
function starsHtml(rating) {
  if (!rating) return '';
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5;
  let s = '';
  for (let i = 0; i < full; i++) s += '★';
  if (half) s += '½';
  return `<span class="stars">${s} ${rating.toFixed(1)}</span>`;
}

async function loadData() {
  try {
    const base = '/Mobi-Me-Mensuel';
    const res  = await fetch(base + '/data/games.json?_=' + Date.now());
    const data = await res.json();
    allGames   = data.games || [];
    document.getElementById('lastUpdated').textContent =
      data.lastUpdated ? 'Mis à jour : ' + new Date(data.lastUpdated).toLocaleDateString('fr-FR') : '';
  } catch (e) {
    console.error('Could not load games.json:', e);
    allGames = [];
  }
  renderCalendar();
}

function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  DAYS_FR.forEach(d => {
    const el = document.createElement('div');
    el.className = 'day-header';
    el.textContent = d;
    grid.appendChild(el);
  });
  const gamesByDate = {};
  const filtered = filterGames(allGames);
  filtered.forEach(g => {
    const [y, m] = g.releaseDate.split('-').map(Number);
    if (y === curYear && m - 1 === curMonth) {
      if (!gamesByDate[g.releaseDate]) gamesByDate[g.releaseDate] = [];
      gamesByDate[g.releaseDate].push(g);
    }
  });
  const monthGames = filtered.filter(g => {
    const [y, m] = g.releaseDate.split('-').map(Number);
    return y === curYear && m - 1 === curMonth;
  });
  document.getElementById('statTotal').textContent   = monthGames.length;
  document.getElementById('statIos').textContent     = monthGames.filter(g => g.platform.includes('ios')).length;
  document.getElementById('statAndroid').textContent = monthGames.filter(g => g.platform.includes('android')).length;
  document.getElementById('statFree').textContent    = monthGames.filter(g => g.price === 'Free').length;
  document.getElementById('monthLabel').textContent  = `${MONTHS_FR[curMonth]} ${curYear}`;
  const firstDay    = new Date(curYear, curMonth, 1).getDay();
  const offset      = (firstDay + 6) % 7;
  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
  for (let i = 0; i < offset; i++) {
    const el = document.createElement('div');
    el.className = 'day-cell empty';
    grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = fmt(curYear, curMonth, d);
    const isToday = today.getFullYear() === curYear && today.getMonth() === curMonth && today.getDate() === d;
    const games   = gamesByDate[dateStr] || [];
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday ? ' today' : '') + (games.length ? ' has-games' : '');
    const num = document.createElement('div');
    num.className = 'day-number';
    num.textContent = d;
    cell.appendChild(num);
    if (games.length) {
      const chipsEl = document.createElement('div');
      chipsEl.className = 'game-chips';
      const maxVisible = 3;
      games.slice(0, maxVisible).forEach(g => {
        const chip = buildChip(g);
        chip.addEventListener('click', (e) => { e.stopPropagation(); openModal(dateStr, games); });
        chipsEl.appendChild(chip);
      });
      if (games.length > maxVisible) {
        const more = document.createElement('div');
        more.className = 'more-badge';
        more.textContent = `+${games.length - maxVisible} more`;
        chipsEl.appendChild(more);
      }
      cell.appendChild(chipsEl);
      cell.addEventListener('click', () => openModal(dateStr, games));
    }
    grid.appendChild(cell);
  }
}

function buildChip(game) {
  const cls  = getPlatformClass(game);
  const chip = document.createElement('div');
  chip.className = `chip ${cls}`;
  if (game.icon) {
    const img = document.createElement('img');
    img.className = 'chip-icon';
    img.src = game.icon;
    img.alt = '';
    img.onerror = () => { img.style.display = 'none'; };
    chip.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'chip-icon-placeholder';
    chip.appendChild(ph);
  }
  const title = document.createElement('span');
  title.className = 'chip-title';
  title.textContent = game.title;
  chip.appendChild(title);
  return chip;
}

function openModal(dateStr, games) {
  const [y, m, d] = dateStr.split('-').map(Number);
  document.getElementById('modalDate').textContent =
    `${d} ${MONTHS_FR[m - 1]} ${y} — ${games.length} jeu${games.length > 1 ? 'x' : ''}`;
  const container = document.getElementById('modalGames');
  container.innerHTML = '';
  games.forEach(game => {
    const link = document.createElement('a');
    link.className = 'modal-game';
    link.href   = game.storeUrl || '#';
    link.target = '_blank';
    link.rel    = 'noopener noreferrer';
    link.innerHTML = `
      <img class="modal-game-icon" src="${game.icon || ''}" alt="" onerror="this.style.display='none'" />
      <div class="modal-game-info">
        <div class="modal-game-title">${game.title}</div>
        <div class="modal-game-meta">
          ${game.platform.includes('ios')     ? '<span class="badge badge-ios">iOS</span>' : ''}
          ${game.platform.includes('android') ? '<span class="badge badge-android">Android</span>' : ''}
          <span class="badge badge-price">${game.price}</span>
          <span>${game.genre}</span>
          ${starsHtml(game.rating)}
        </div>
        ${game.developer ? `<div style="font-size:0.65rem;color:var(--muted);margin-top:4px">${game.developer}</div>` : ''}
      </div>`;
    container.appendChild(link);
  });
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

document.getElementById('btnPrev').addEventListener('click', () => {
  curMonth--; if (curMonth < 0) { curMonth = 11; curYear--; } renderCalendar();
});
document.getElementById('btnNext').addEventListener('click', () => {
  curMonth++; if (curMonth > 11) { curMonth = 0; curYear++; } renderCalendar();
});
document.getElementById('btnToday').addEventListener('click', () => {
  curYear = today.getFullYear(); curMonth = today.getMonth(); renderCalendar();
});
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    curFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-all','active-ios','active-android'));
    btn.classList.add(`active-${curFilter}`);
    renderCalendar();
  });
});
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadData();
</script>
</body>
</html>
